name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  client:
    name: Client typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Client is an npm workspace; lockfile lives at the repo root.
          cache-dependency-path: package-lock.json
      - name: Install (root workspace)
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: client
      - name: Build
        run: npx vite build
        working-directory: client

  server:
    name: Server typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: server

  audio-engine:
    name: Audio engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          # The pyproject defines deps; install with the test extra.
          pip install -e '.[test]' || \
          pip install fastapi uvicorn pytest pytest-asyncio httpx numpy scipy librosa soundfile pydantic python-multipart
        working-directory: audio-engine
      - name: Run pytest
        # Real test gate — was previously masked with `|| true`. Drop the mask;
        # if pitch / DTW / scoring / endpoint regressions land we want CI red.
        run: pytest -q
        working-directory: audio-engine
