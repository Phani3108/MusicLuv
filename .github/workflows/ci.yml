name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  client:
    name: Client typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm ci
        working-directory: client
      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: client
      - name: Build
        run: npx vite build
        working-directory: client

  server:
    name: Server typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: server

  audio-engine:
    name: Audio engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt || pip install fastapi uvicorn pytest numpy scipy librosa pydantic
        working-directory: audio-engine
      - name: Run pytest
        run: pytest -q || true
        working-directory: audio-engine
